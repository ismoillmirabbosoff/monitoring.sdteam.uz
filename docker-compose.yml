services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: monitoring
      POSTGRES_PASSWORD: monitoring
      POSTGRES_DB: monitoring
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monitoring"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    env_file: .env
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: "postgres://monitoring:monitoring@db:5432/monitoring?sslmode=disable"
    ports:
      - "127.0.0.1:8085:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
