server {
    server_name callsmonitoring.sdteam.uz;
    # certbot bu blokni avtomatik HTTPS'ga yo'naltiradi.

    client_max_body_size 10m;

    # OnlinePBX WebSocket'ini shu domen (443) orqali proxy qilamiz.
    # Brauzer to'g'ridan-to'g'ri pbx12127.onpbx.ru:3342 ga ulana olmaydi
    # (ko'p tarmoqlar/Cloudflare nostandart portlarni bloklaydi), shu bois
    # jonli status (gaplashyapti/jiringlamoqda/DND) kelmaydi. Proxy buni hal qiladi.
    location /onpbx-ws/ {
        proxy_pass https://pbx12127.onpbx.ru:3342/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host pbx12127.onpbx.ru;
        proxy_ssl_server_name on;      # SNI (*.onpbx.ru sertifikati uchun)
        proxy_read_timeout 3600s;      # WS uzoq ochiq turadi
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    location / {
        proxy_pass http://localhost:8085;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }


    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/callsmonitoring.sdteam.uz/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/callsmonitoring.sdteam.uz/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = callsmonitoring.sdteam.uz) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    server_name callsmonitoring.sdteam.uz;
    listen 80;
    return 404; # managed by Certbot


}
