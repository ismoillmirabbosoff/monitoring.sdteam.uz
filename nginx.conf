# --- Rate limiting zonalari (DDoS / brute force backstop) ---
# Bu fayl nginx http{} bloki ichida include qilinadi (sites-enabled).
# Cloudflare orqasida bo'lsangiz haqiqiy IP bo'yicha cheklashni Cloudflare WAF/Rate
# Limiting'da yoqing. Ilova darajasidagi cheklov (Go) X-Forwarded-For'ni ishlatib
# haqiqiy mijoz IP'si bo'yicha aniq cheklaydi — bu esa qo'shimcha edge himoya.
limit_req_zone $binary_remote_addr zone=cm_general:10m rate=50r/s;
limit_req_zone $binary_remote_addr zone=cm_login:10m rate=3r/s;

server {
    server_name callsmonitoring.sdteam.uz;
    # certbot bu blokni avtomatik HTTPS'ga yo'naltiradi.

    client_max_body_size 10m;

    # Login/verify — brute force backstop (parol topishga urinishni cheklaydi)
    location ~ ^/api/(auth|admin)/(login|verify) {
        limit_req zone=cm_login burst=10 nodelay;
        proxy_pass http://localhost:8085;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        limit_req zone=cm_general burst=100 nodelay;   # flood backstop
        proxy_pass http://localhost:8085;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }


    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/callsmonitoring.sdteam.uz/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/callsmonitoring.sdteam.uz/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = callsmonitoring.sdteam.uz) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    server_name callsmonitoring.sdteam.uz;
    listen 80;
    return 404; # managed by Certbot


}
